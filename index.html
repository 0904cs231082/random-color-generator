<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Premium Random Color Generator</title>

<meta name="description" content="Premium Random Color Generator with HEX, RGB, HSL, Gradient and History.">
<meta name="author" content="Prateet Dhakad">

<link rel="stylesheet" href="css/styles.css">
<link rel="icon" href="data:,">
</head>

<body>

<div class="bg-shapes"></div>

<header>
  <h1 class="animated-heading">Random Color Generator</h1>
  <p>HEX • Gradient • History</p>
</header>

<main>
  <section class="glass-card">

    <div id="colorBox"></div>

    <div class="code-row">
      <h2 id="colorCode">#FFFFFF</h2>
      <button id="copyBtn">Copy</button>
    </div>

    <div class="btn-group">
      <button id="generateBtn">Generate</button>
      <button id="gradientBtn">Gradient</button>
      <button id="autoBtn">Auto</button>
      <button id="themeToggle">Theme</button>
    </div>

    <input type="text" id="customInput" placeholder="Enter HEX (#ff0000)">
    <button id="applyCustom">Apply</button>

    <div class="extra-btns">
      <button id="exportPalette">Export Palette</button>
      <button id="downloadImage">Download Image</button>
    </div>

  </section>

  <section class="history-section">
    <h3>Color History</h3>
    <div id="historyList"></div>
  </section>
</main>

<footer class="history-section">
  © 2026 Prateet Dhakad | Production Ready
</footer>

<script src="js/script.js" defer></script>
</body>
</html>
